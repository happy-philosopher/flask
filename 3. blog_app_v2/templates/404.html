<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../static/css/404.css">
    <title>404 — Страница не найдена</title>
</head>
<body>
    <main class="error-container">
        <div class="error-content">
            <h1 class="error-code" aria-label="Error 404">404</h1>
            <p class="error-message">Ой! Страница, которую вы ищете, не существует.</p>
            <p class="error-description">Возможно, ее переместили или удалили.</p>
            <nav class="error-nav">
                <a href="/" class="btn-home">Перейти на главную страницу</a>
            </nav>
        </div>
    </main>
</body>
</html>
